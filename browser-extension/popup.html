<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 320px; font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 16px; color: #1c1e21; }
      h1 { font-size: 15px; margin: 0 0 4px; }
      p { font-size: 12px; color: #606770; margin: 0 0 12px; line-height: 1.4; }
      label { font-size: 11px; font-weight: 600; color: #606770; display: block; margin-bottom: 4px; }
      input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 12px; border: 1px solid #dddfe2; border-radius: 6px; margin-bottom: 12px; }
      button { width: 100%; padding: 10px; font-size: 14px; font-weight: 600; color: #fff; background: #1877f2; border: none; border-radius: 6px; cursor: pointer; }
      button:disabled { background: #9bbcf0; cursor: default; }
      #status { font-size: 12px; margin-top: 12px; padding: 8px; border-radius: 6px; display: none; line-height: 1.4; }
      #status.ok { display: block; background: #e6f5eb; color: #0a7d33; }
      #status.err { display: block; background: #fdeae2; color: #b23c17; }
      #status.info { display: block; background: #f0f2f5; color: #606770; }
    </style>
  </head>
  <body>
    <h1>GroupMarket Connector</h1>
    <p>Connects the Facebook account you're logged into in this browser. Make sure you're logged into both Facebook and GroupMarket first.</p>
    <label for="appUrl">GroupMarket URL</label>
    <input id="appUrl" type="text" value="https://fb-two-rho.vercel.app" />
    <button id="connect">Connect this Facebook account</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
